<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        :root {
            --bg:        #0e0e11;
            --surface:   #16161a;
            --surface2:  #1c1c22;
            --surface3:  #242429;
            --p-lavender: #c4b5fd;
            --p-sky:      #bae6fd;
            --p-mint:     #a7f3d0;
            --p-peach:    #fcd5b0;
            --p-rose:     #fda4af;
            --p-lemon:    #fef08a;
            --text:      #f0eff4;
            --text2:     #c4c2cc;
            --muted:     #6b6878;
            --border:    rgba(255,255,255,0.07);
            --border2:   rgba(255,255,255,0.13);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        }
        .mono { font-family: 'DM Mono', monospace; }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; }
        .card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.35); }

        /* Nav */
        .nav-pill { border-radius: 9px; padding: 6px 13px; font-size: 0.84rem; font-weight: 500; transition: all 0.15s; color: var(--muted); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; }
        .nav-pill:hover { color: var(--text2); background: var(--surface2); }
        .nav-pill.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

        /* Pastel tags */
        .ptag { font-family: 'DM Mono', monospace; font-size: 0.67rem; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
        .ptag-lavender { background: rgba(196,181,253,0.12); color: var(--p-lavender); border: 1px solid rgba(196,181,253,0.2); }
        .ptag-sky      { background: rgba(186,230,253,0.10); color: var(--p-sky);      border: 1px solid rgba(186,230,253,0.18); }
        .ptag-mint     { background: rgba(167,243,208,0.10); color: var(--p-mint);     border: 1px solid rgba(167,243,208,0.18); }
        .ptag-peach    { background: rgba(252,213,176,0.10); color: var(--p-peach);    border: 1px solid rgba(252,213,176,0.18); }
        .ptag-rose     { background: rgba(253,164,175,0.10); color: var(--p-rose);     border: 1px solid rgba(253,164,175,0.18); }
        .ptag-lemon    { background: rgba(254,240,138,0.10); color: var(--p-lemon);    border: 1px solid rgba(254,240,138,0.18); }

        /* Skill pills */
        .skill-pill { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 0.78rem; padding: 4px 12px; border-radius: 999px; transition: all 0.15s; }
        .skill-pill:hover { border-color: var(--border2); color: var(--text); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

        /* Animations */
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes pulseDot { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
        @keyframes typeBlink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        @keyframes modalIn { from{opacity:0;transform:scale(0.93) translateY(10px);} to{opacity:1;transform:scale(1) translateY(0);} }
        @keyframes popIn { 0%{transform:scale(0.65);opacity:0;} 65%{transform:scale(1.06);} 100%{transform:scale(1);opacity:1;} }
        @keyframes shimmer { from{transform:translateX(-100%) skewX(-12deg);} to{transform:translateX(260%) skewX(-12deg);} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:translateY(0);} }

        .fade-up   { animation: fadeUp 0.42s ease both; }
        .fade-up-1 { animation: fadeUp 0.42s 0.07s ease both; }
        .fade-up-2 { animation: fadeUp 0.42s 0.14s ease both; }
        .fade-up-3 { animation: fadeUp 0.42s 0.21s ease both; }
        .pulse-dot { animation: pulseDot 2.2s ease-in-out infinite; }
        .type-cursor { display:inline-block; width:2px; height:1em; background:var(--p-lavender); margin-left:2px; vertical-align:text-bottom; animation:typeBlink 0.75s step-end infinite; }
        .shimmer-card::after { content:''; position:absolute; top:0; left:0; width:35%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.025),transparent); animation:shimmer 4.5s ease-in-out infinite; pointer-events:none; }
        .stat-pop   { animation: popIn 0.48s cubic-bezier(0.34,1.4,0.64,1) both; }
        .stat-pop-1 { animation: popIn 0.48s 0.09s cubic-bezier(0.34,1.4,0.64,1) both; }
        .stat-pop-2 { animation: popIn 0.48s 0.18s cubic-bezier(0.34,1.4,0.64,1) both; }
        .slide-down { animation: slideDown 0.15s ease both; }

        /* Modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.72); backdrop-filter:blur(10px); z-index:10000; display:flex; align-items:center; justify-content:center; padding:1rem; animation:fadeIn 0.18s ease both; }
        .modal-box { background:var(--surface); border:1px solid var(--border2); border-radius:20px; max-width:500px; width:100%; max-height:85vh; overflow-y:auto; animation:modalIn 0.25s cubic-bezier(0.34,1.2,0.64,1) both; box-shadow:0 40px 80px rgba(0,0,0,0.55); }
        .modal-box::-webkit-scrollbar { width:3px; }
        .modal-box::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }

        /* Featured cert */
        .featured-card { background:var(--surface); border:1px solid rgba(196,181,253,0.22); border-radius:18px; position:relative; overflow:hidden; transition:border-color 0.2s, box-shadow 0.2s; cursor:pointer; }
        .featured-card:hover { border-color:rgba(196,181,253,0.45); box-shadow:0 0 40px rgba(196,181,253,0.07); }

        /* Cert ring */
        .cert-ring { background:var(--surface2); border:1px solid var(--border2); }

        /* Diff bar */
        .diff-bar-track { height:5px; background:var(--surface3); border-radius:99px; overflow:hidden; }
        .diff-bar-fill { height:100%; border-radius:99px; }

        /* Toggle */
        .toggle-wrap { display:inline-flex; background:var(--surface2); border:1px solid var(--border); border-radius:11px; padding:3px; gap:2px; }
        .toggle-btn { padding:6px 15px; border-radius:8px; font-size:0.84rem; font-weight:500; color:var(--muted); transition:all 0.15s; display:flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .toggle-btn.on { background:var(--surface3); color:var(--text); border:1px solid var(--border2); }

        /* Hamburger */
        .hline { display:block; width:17px; height:1.5px; background:var(--muted); border-radius:2px; transition:all 0.22s; }
        
        /* Custom spacing for nav */
        .nav-spacer {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .nav-spacer {
                display: none;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const Icon = ({ name, className = 'w-5 h-5', ...props }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (ref.current && lucide[name]) {
            const el = lucide.createElement(lucide[name], { class: className });
            ref.current.innerHTML = ''; ref.current.appendChild(el);
        }
    }, [name, className]);
    return <i ref={ref} className={`flex-shrink-0 ${className}`} {...props} />;
};

const useTyping = (text, speed = 42, delay = 800) => {
    const [displayed, setDisplayed] = useState('');
    const [done, setDone] = useState(false);
    useEffect(() => {
        setDisplayed(''); setDone(false); let i = 0;
        const t = setTimeout(() => {
            const iv = setInterval(() => { i++; setDisplayed(text.slice(0,i)); if(i>=text.length){clearInterval(iv);setDone(true);} }, speed);
            return () => clearInterval(iv);
        }, delay);
        return () => clearTimeout(t);
    }, [text]);
    return { displayed, done };
};

                            <CertBadgeImg src={c.badge} alt={c.short} fallback={c.short} size={48}/>
                            <div style={{flex:1,minWidth:0}}>
                                <p style={{fontSize:'0.86rem',fontWeight:600,color:'var(--text)',lineHeight:1.3,marginBottom:3}}>{c.name}</p>
                                <p className="mono" style={{fontSize:'0.67rem',color:'var(--muted)',marginBottom:8}}>{c.issuer} · {c.year}</p>
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                    <Badge color="mint">Active</Badge>
                                    <span className="mono" style={{display:'flex',alignItems:'center',gap:3,fontSize:'0.63rem',color:'var(--p-lavender)'}}>
                                        details <Icon name="ChevronRight" className="w-3 h-3"/>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </Card>
                </button>
            ))}
        </div>
        {selected && <CertModal cert={selected} onClose={()=>setSelected(null)}/>}
    </div>
    );
};

const ProjectsPage = () => {
    const [tab, setTab] = useState('labs');
    const total = CD_LABS.length;
    const counts = CD_LABS.reduce((a,l)=>{a[l.difficulty]=(a[l.difficulty]||0)+1;return a;},{});
    const cats   = CD_LABS.reduce((a,l)=>{a[l.category]=(a[l.category]||0)+1;return a;},{});
    const maxCat = Math.max(...Object.values(cats));
    return (
    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:16}}>
        <PageHeader title="Labs & Projects"/>
        <div className="toggle-wrap fade-up-1">
            {[{id:'labs',label:'CyberDefenders Labs',icon:'FlaskConical'},{id:'projects',label:'Projects',icon:'Code2'}].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} className={`toggle-btn ${tab===t.id?'on':''}`}>
                    <Icon name={t.icon} className="w-3.5 h-3.5"/>{t.label}
                </button>
            ))}
        </div>

        {tab==='labs' && (
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{display:'flex',justifyContent:'flex-end'}}>
                <a href="https://cyberdefenders.org/p/Afterguard/" target="_blank" rel="noopener noreferrer" className="mono" style={{fontSize:'0.7rem',color:'var(--p-lavender)',textDecoration:'none',display:'flex',alignItems:'center',gap:4}}>
                    View Profile <Icon name="ExternalLink" className="w-3 h-3"/>
                </a>
            </div>
            {/* Stats */}
            <Card style={{padding:22}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:18}}>
                    {[{label:'Total',val:total,color:'var(--p-lavender)'},{label:'Easy',val:counts.Easy||0,color:'var(--p-mint)'},{label:'Medium',val:counts.Medium||0,color:'var(--p-lemon)'},{label:'Hard',val:counts.Hard||0,color:'var(--p-peach)'}].map((s,i)=>(
                        <div key={i} style={{textAlign:'center',background:'var(--surface2)',borderRadius:10,padding:'10px 6px',border:'1px solid var(--border)'}}>
                            <div style={{fontSize:'1.3rem',fontWeight:800,color:s.color,letterSpacing:'-0.02em'}}>{s.val}</div>
                            <div className="mono" style={{fontSize:'0.6rem',color:'var(--muted)',marginTop:2,letterSpacing:'0.05em'}}>{s.label.toUpperCase()}</div>
                        </div>
                    ))}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:18}}>
                    {Object.entries(DIFF_HEX).map(([diff,hex])=>(
                        <div key={diff} style={{display:'flex',alignItems:'center',gap:10}}>
                            <span className="mono" style={{fontSize:'0.67rem',color:hex,width:52,textAlign:'right',flexShrink:0}}>{diff}</span>
                            <div className="diff-bar-track" style={{flex:1}}><div className="diff-bar-fill" style={{width:total?`${((counts[diff]||0)/total)*100}%`:'0%',background:hex,opacity:0.75}}/></div>
                            <span className="mono" style={{fontSize:'0.67rem',color:'var(--muted)',width:14,textAlign:'right'}}>{counts[diff]||0}</span>
                        </div>
                    ))}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,count],i)=>(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                            <span style={{fontSize:'0.78rem',color:'var(--text2)',width:140,flexShrink:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{cat}</span>
                            <div className="diff-bar-track" style={{flex:1}}><div className="diff-bar-fill" style={{width:`${(count/maxCat)*100}%`,background:'var(--p-lavender)',opacity:0.65}}/></div>
                            <span className="mono" style={{fontSize:'0.67rem',color:'var(--muted)',width:14,textAlign:'right'}}>{count}</span>
                        </div>
                    ))}
                </div>
            </Card>
            {/* Lab cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:9}}>
                {CD_LABS.map((lab,i)=>(
                    <a key={i} href={lab.url} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}>
                        <Card style={{padding:15}}>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                                <p style={{fontSize:'0.84rem',fontWeight:600,color:'var(--text)'}}>{lab.name}</p>
                                <Icon name="ExternalLink" className="w-3.5 h-3.5 flex-shrink-0" style={{color:'var(--muted)'}}/>
                            </div>
                            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                                <Badge color="lavender">{lab.category}</Badge>
                                {lab.difficulty && <Badge color={DIFF_COLOR[lab.difficulty]||'lavender'}>{lab.difficulty}</Badge>}
                                {lab.completed && <span className="mono" style={{fontSize:'0.63rem',color:'var(--p-mint)',marginLeft:'auto'}}>✓ {lab.completed}</span>}
                            </div>
                        </Card>
                    </a>
                ))}
            </div>
        </div>
        )}

        {tab==='projects' && (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {PROJECTS.map((p,i)=>(
                <Card key={i} style={{padding:22}}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
                        <div style={{width:42,height:42,borderRadius:11,background:'var(--surface2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            <Icon name={p.icon} className="w-4.5 h-4.5" style={{color:`var(--p-${p.color})`}}/>
                        </div>
                        <div>
                            <p style={{fontSize:'0.92rem',fontWeight:600,color:'var(--text)',marginBottom:4}}>{p.name}</p>
                            <p style={{fontSize:'0.84rem',color:'var(--text2)',lineHeight:1.65}}>{p.detail}</p>
                        </div>
                    </div>
                </Card>
            ))}
        </div>
        )}
    </div>
    );
};

    <div className="fade-up" style={{display:'flex',flexDirection:'column',gap:16}}>
        <PageHeader title="Skills & Tools"/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:10}}>
            {SKILLS.map((group,i)=>(
                <Card key={i} style={{padding:20}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:`var(--p-${group.color})`,flexShrink:0}}/>
                        <p style={{fontSize:'0.78rem',fontWeight:600,color:`var(--p-${group.color})`,letterSpacing:'0.03em'}}>{group.category}</p>

// ── App ───────────────────────────────────────────────────────
const App = () => {
    const [page, setPage] = useState('home');
    const [menuOpen, setMenuOpen] = useState(false);
    const pages = { home:<HomePage/>, certs:<CertsPage/>, projects:<ProjectsPage/>, competitions:<CompetitionsPage/>, experience:<ExperiencePage/>, skills:<SkillsPage/> };

    return (
    <div style={{minHeight:'100vh',background:'var(--bg)',backgroundColor:'#0e0e11'}}>
        {/* Nav */}
        <nav style={{position:'sticky',top:0,zIndex:50,background:'rgba(14,14,17,0.85)',backdropFilter:'blur(18px)',borderBottom:'1px solid var(--border)'}}>
            <div style={{maxWidth:860,margin:'0 auto',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:54}}>
                <button onClick={()=>setPage('home')} style={{display:'flex',alignItems:'center',gap:10,background:'none',border:'none',cursor:'pointer'}}>
                    <div style={{width:28,height:28,borderRadius:8,background:'var(--surface2)',border:'1px solid var(--border2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <Icon name="Shield" className="w-3.5 h-3.5" style={{color:'var(--p-lavender)'}}/>
                    </div>
                    <span style={{fontWeight:700,fontSize:'0.92rem',color:'var(--text)',letterSpacing:'-0.01em',fontFamily:'DM Sans,sans-serif'}}>Afterguard</span>
                </button>

                {/* Spacer to push tabs to the right, creating more breathing room */}
                <div className="nav-spacer" style={{flex:1, minWidth: '24px'}}></div>

                <div className="hidden md:flex items-center" style={{gap:2}}>
                    {NAV.map(item=>(
                        <button key={item.id} onClick={()=>setPage(item.id)} className={`nav-pill ${page===item.id?'active':''}`}>
                            <Icon name={item.icon} className="w-3.5 h-3.5"/>{item.label}
                        </button>
                    ))}
                </div>

                <button className="md:hidden" onClick={()=>setMenuOpen(!menuOpen)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',gap:5,padding:6}}>
                    <span className="hline" style={menuOpen?{transform:'rotate(45deg) translate(4px,4.5px)'}:{}}/>
                    <span className="hline" style={menuOpen?{opacity:0}:{}}/>
                    <span className="hline" style={menuOpen?{transform:'rotate(-45deg) translate(4px,-4.5px)'}:{}}/>
                </button>
            </div>
            {menuOpen && (
                <div className="slide-down md:hidden" style={{borderTop:'1px solid var(--border)',padding:'6px 12px 10px'}}>
                    {NAV.map(item=>(
                        <button key={item.id} onClick={()=>{setPage(item.id);setMenuOpen(false);}}
                            style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 12px',borderRadius:9,background:'none',border:'none',cursor:'pointer',color:page===item.id?'var(--text)':'var(--muted)',fontFamily:'DM Sans,sans-serif',fontSize:'0.86rem',fontWeight:500}}>
                            <Icon name={item.icon} className="w-4 h-4"/>{item.label}
                        </button>
                    ))}
                </div>
            )}
        </nav>

        <main style={{maxWidth:860,margin:'0 auto',padding:'32px 20px 64px'}}>
            {pages[page]}
        </main>

        <footer style={{textAlign:'center',padding:'20px',borderTop:'1px solid var(--border)'}}>
            <p className="mono" style={{fontSize:'0.65rem',color:'var(--muted)'}}>
                © 2026 Afterguard · Johann Weingertner · johannweingertner.github.io
            </p>
        </footer>
    </div>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
