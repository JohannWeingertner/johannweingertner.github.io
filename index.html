<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Smooth hover effects for buttons and interactive elements */
        button, a {
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        button:hover, a:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Welcome to My Portfolio</h1>
    <h2>Certifications</h2>
    <p id="certificationCount"></p>
    <script>
        const CERTIFICATIONS = ['Certificate 1', 'Certificate 2', 'Certificate 3']; // replace with actual certifications
        document.getElementById('certificationCount').innerText = `I have ${CERTIFICATIONS.length} certifications.`;
    </script>
</body>
</html>
